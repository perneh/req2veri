apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "req2veri.labels" . | nindent 4 }}
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "req2veri.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: {{ .Values.backend.image }}
          workingDir: /app
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: req2veri-secrets
                  key: database-url
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          workingDir: /app
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: req2veri-secrets
                  key: database-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: req2veri-secrets
                  key: jwt-secret-key
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: req2veri-backend-config
                  key: CORS_ORIGINS
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
