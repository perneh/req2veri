[pytest]
# Default collection: passing functional suite only (see ``screen_fail_suites/`` for failure demos).
testpaths = tests
addopts =
    --browser chromium
    --screenshot only-on-failure
    --output test-results
    --full-page-screenshot
markers =
    screen_fail: Intentional failures to verify Playwright failure artifacts (see README). Not collected by default testpaths.
